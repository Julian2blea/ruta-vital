{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <div class="container">
        <h1>Bienvenido {{ user.username }}</h1>
        {% if user.is_authenticated %}
            <a href="{% url 'cuestionario' %}" class="button">Ir al cuestionario</a>
            <a href="{% url 'cerrar_sesion' %}" class="button danger">Cerrar sesión</a>
        {% else %}
            <a href="{% url 'login' %}" class="button success">Iniciar sesión</a>
        {% endif %}
    </div>
</body>
</html>
